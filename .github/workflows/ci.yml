name: SentinelShield — CI Tests
 
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
 
jobs:
  test:
    name: Run pytest suite
    runs-on: ubuntu-latest
 
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
 
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml
        env:
          FLASK_ENV: testing
 
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml
 
  smoke-test:
    name: App startup smoke test
    runs-on: ubuntu-latest
    needs: test
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Start app and verify /health responds 200
        run: |
          FLASK_ENV=production gunicorn app:app --bind 0.0.0.0:5000 --workers 1 --daemon --pid /tmp/gunicorn.pid
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
          echo "Health check returned: $STATUS"
          kill $(cat /tmp/gunicorn.pid) || true
          [ "$STATUS" = "200" ] || (echo "Health check FAILED" && exit 1)
